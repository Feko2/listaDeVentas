<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Venta de cochera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Passion+One:wght@700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
    --paper: #C9C1A8;
    --paper-deep: #AFA68C;
    --ink: #151311;
    --sign: #0E3B2C;
    --sign-mid: #165A42;
    --flyer: #F0C93A;
    --flyer-dark: #C9A61E;
    --stamp: #B71C1C;
    --card: #F2EEE0;
    --mute: #5C5648;
    --sold: #7A7466;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Sora', sans-serif;
    color: var(--ink);
    min-height:100vh;
    padding-bottom: 72px;
    background-color: var(--paper);
    background-image:
      radial-gradient(ellipse 120% 80% at 10% -10%, rgba(240,201,58,0.22), transparent 55%),
      radial-gradient(ellipse 90% 60% at 100% 0%, rgba(14,59,44,0.12), transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 11px, rgba(0,0,0,0.025) 11px, rgba(0,0,0,0.025) 12px),
      repeating-linear-gradient(90deg, transparent, transparent 11px, rgba(0,0,0,0.02) 11px, rgba(0,0,0,0.02) 12px);
  }
  @keyframes tapeDrop {
    from { transform: translateY(-18px) rotate(-6deg); opacity: 0; }
    to { transform: translateY(0) rotate(-3deg); opacity: 1; }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes stampPop {
    0% { transform: translate(-50%,-50%) rotate(-12deg) scale(1.25); opacity: 0; }
    70% { transform: translate(-50%,-50%) rotate(-8deg) scale(0.96); opacity: 1; }
    100% { transform: translate(-50%,-50%) rotate(-8deg) scale(1); opacity: 1; }
  }
  header{
    background:
      linear-gradient(180deg, rgba(255,255,255,0.06), transparent 40%),
      linear-gradient(135deg, var(--sign) 0%, #0A2E22 55%, var(--sign-mid) 100%);
    color: #F6F1DE;
    padding: 28px 18px 34px;
    position: relative;
    border-bottom: 5px solid var(--flyer);
    overflow: hidden;
  }
  header::before{
    content:"";
    position:absolute;
    inset:0;
    background:
      repeating-linear-gradient(-18deg, transparent, transparent 18px, rgba(0,0,0,0.06) 18px, rgba(0,0,0,0.06) 19px);
    pointer-events:none;
  }
  .brand-kicker{
    position:relative;
    z-index:1;
    display:inline-block;
    font-family: 'Passion One', cursive;
    font-size: clamp(0.95rem, 3.5vw, 1.15rem);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--flyer);
    margin: 0 0 6px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.35);
  }
  header h1{
    position:relative;
    z-index:1;
    margin:0;
    font-family: 'Passion One', cursive;
    font-size: clamp(2.2rem, 8vw, 3.2rem);
    line-height: 0.95;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    max-width: 14ch;
  }
  header .sub{
    position:relative;
    z-index:1;
    margin-top: 10px;
    font-size: 0.88rem;
    line-height: 1.45;
    opacity: 0.88;
    max-width: 36rem;
    font-weight: 500;
  }
  header .panel-tag{
    display:inline-block;
    margin-top: 12px;
    position:relative;
    z-index:1;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--flyer);
    color: var(--ink);
    padding: 5px 10px;
    border-radius: 3px;
    transform: rotate(-1.5deg);
  }
  .tape{
    position:absolute;
    bottom:-12px; left:22px;
    width: 78px; height: 22px;
    background: linear-gradient(180deg, #F5D85A, var(--flyer-dark));
    opacity: 0.95;
    transform: rotate(-3deg);
    box-shadow: 0 2px 0 rgba(0,0,0,0.15);
    animation: tapeDrop 0.55s ease-out both;
    z-index:2;
  }
  .tape::after{
    content:"";
    position:absolute;
    inset:0;
    background: repeating-linear-gradient(90deg, transparent 0 8px, rgba(0,0,0,0.08) 8px 10px);
  }

  .controls{
    max-width: 920px;
    margin: 34px auto 10px;
    padding: 0 16px;
  }
  .search-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .search-row input{
    flex:1;
    padding: 12px 14px;
    border-radius: 4px;
    border: 2px solid var(--sign);
    font-size: 0.95rem;
    font-family: inherit;
    background: var(--card);
    color: var(--ink);
  }
  .search-row input:focus{
    outline: none;
    border-color: var(--flyer-dark);
    box-shadow: 0 0 0 3px rgba(240,201,58,0.35);
  }
  .filters{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom: 12px;
  }
  .chip{
    padding: 7px 12px;
    border-radius: 3px;
    border: 2px solid var(--sign);
    background: transparent;
    color: var(--sign);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor:pointer;
    transition: background .15s ease, color .15s ease, transform .15s ease;
    white-space:nowrap;
  }
  .chip:hover{ transform: translateY(-1px); }
  .chip.active{
    background: var(--sign);
    color: var(--flyer);
  }
  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin: 14px 0 4px;
    font-size: 0.85rem;
  }
  .toolbar label{
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
    user-select:none;
    font-weight: 600;
    color: var(--mute);
  }
  .price-filter{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom: 10px;
  }
  .price-filter span{
    font-size: 0.75rem;
    color: var(--mute);
    font-weight:700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .sort-btn{
    display:flex;
    align-items:center;
    gap:6px;
    padding: 7px 12px;
    border-radius: 3px;
    border: 2px solid var(--sign);
    background: transparent;
    color: var(--sign);
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 700;
    cursor:pointer;
  }
  .sort-btn.active{
    background: var(--sign);
    color: var(--flyer);
  }

  .grid{
    max-width: 920px;
    margin: 18px auto;
    padding: 0 16px;
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }

  .card{
    background: var(--card);
    border-radius: 4px;
    border: 2px solid rgba(21,19,17,0.12);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    transition: transform .18s ease, border-color .18s ease;
    cursor:pointer;
    animation: cardIn 0.45s ease both;
    box-shadow: 3px 3px 0 rgba(14,59,44,0.12);
  }
  .card:nth-child(3n){ animation-delay: 0.04s; }
  .card:nth-child(3n+1){ animation-delay: 0.08s; }
  .card:nth-child(3n+2){ animation-delay: 0.12s; }
  .card:hover{
    transform: translateY(-3px) rotate(-0.4deg);
    border-color: var(--sign);
  }
  .card:active{ transform: scale(0.985); }
  .card.sold{ opacity: 0.62; }
  .card.sold .card-body::after{
    content:"VENDIDO";
    position:absolute;
    top: 48%;
    left:50%;
    transform: translate(-50%,-50%) rotate(-8deg);
    font-family: 'Passion One', cursive;
    font-size:1.55rem;
    color: var(--stamp);
    border: 3px solid var(--stamp);
    padding: 2px 12px;
    letter-spacing: 0.08em;
    pointer-events:none;
    background: rgba(242,238,224,0.85);
    animation: stampPop 0.4s ease-out both;
  }

  .photo-box{
    height: 148px;
    background:
      linear-gradient(135deg, var(--paper-deep), #9A9178);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .photo-box img{
    width:100%;
    height:100%;
    object-fit: cover;
  }
  .photo-box .placeholder{
    font-size: 0.75rem;
    color: #4d473a;
    text-align:center;
    padding: 8px;
    font-weight: 600;
  }
  .photo-box .placeholder svg{
    display:block;
    margin: 0 auto 4px;
    opacity: 0.55;
  }
  .photo-count{
    position:absolute;
    top:8px; right:8px;
    background: var(--sign);
    color: var(--flyer);
    font-size:0.68rem;
    font-weight:700;
    padding: 3px 8px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  .card-body{
    padding: 12px 14px 14px;
    display:flex;
    flex-direction:column;
    gap:6px;
    flex:1;
    position:relative;
  }
  .cat-badge{
    align-self:flex-start;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight:700;
    padding: 3px 8px;
    border-radius: 2px;
    color: white;
  }
  .name{
    font-size: 0.98rem;
    font-weight: 700;
    line-height:1.25;
  }
  .price-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:auto;
    padding-top: 6px;
  }
  .price{
    font-family: 'Passion One', cursive;
    font-size: 1.45rem;
    color: var(--stamp);
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .sold-toggle{
    font-size: 0.7rem;
    border: 2px solid var(--sign);
    background: transparent;
    color: var(--sign);
    border-radius: 3px;
    padding: 4px 8px;
    cursor:pointer;
    font-weight:700;
    font-family: inherit;
  }
  .sold-toggle.is-sold{
    background: var(--sold);
    border-color: var(--sold);
    color:white;
  }
  .status-tag{
    font-size: 0.68rem;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-tag.available{
    background: rgba(14,59,44,0.12);
    color: var(--sign);
  }
  .status-tag.gone{
    background: var(--sold);
    color: white;
  }

  .empty{
    text-align:center;
    padding: 40px 20px;
    color: var(--mute);
    font-size: 0.9rem;
  }

  footer{
    text-align:center;
    font-size: 0.78rem;
    color: var(--mute);
    padding: 28px 16px;
    font-weight: 500;
  }

  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background: rgba(14,20,16,0.72);
    z-index: 1000;
    align-items:flex-start;
    justify-content:center;
    overflow-y:auto;
    padding: 24px 14px;
  }
  .modal-overlay.open{ display:flex; }
  .modal{
    background: var(--card);
    border-radius: 6px;
    max-width: 480px;
    width:100%;
    overflow:hidden;
    border: 3px solid var(--sign);
    position:relative;
    box-shadow: 6px 6px 0 rgba(14,59,44,0.25);
  }
  .modal-close{
    position:absolute;
    top:10px; right:10px;
    width:34px; height:34px;
    border-radius: 3px;
    background: var(--sign);
    color: var(--flyer);
    border:none;
    font-size:1.1rem;
    cursor:pointer;
    z-index:5;
    font-weight: 700;
  }
  .modal-main-photo{
    height: 260px;
    background: var(--paper-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .modal-main-photo img{
    width:100%; height:100%;
    object-fit: cover;
  }
  .modal-main-photo .placeholder{
    color: var(--mute);
    font-size:0.85rem;
    text-align:center;
    font-weight: 600;
  }
  .thumb-row{
    display:flex;
    gap:8px;
    padding: 10px 14px;
    overflow-x:auto;
    background: var(--paper);
  }
  .thumb{
    width:56px; height:56px;
    border-radius:4px;
    object-fit:cover;
    flex-shrink:0;
    cursor:pointer;
    border: 2px solid transparent;
  }
  .thumb.active{ border-color: var(--sign); }
  .thumb-add{
    width:56px; height:56px;
    border-radius:4px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--card);
    border: 2px dashed var(--sign);
    color: var(--sign);
    font-size: 1.3rem;
    cursor:pointer;
    font-weight: 700;
  }
  .thumb-remove{ position:relative; }
  .thumb-remove .x{
    position:absolute;
    top:-6px; right:-6px;
    width:18px; height:18px;
    border-radius: 50%;
    background: var(--stamp);
    color:white;
    font-size:0.65rem;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .modal-body{ padding: 16px 18px 20px; }
  .modal-body .cat-badge{
    display:inline-block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight:700;
    padding: 4px 10px;
    border-radius: 2px;
    color: white;
    margin-bottom: 10px;
  }
  .modal-body h2{
    margin: 0 0 6px;
    font-family: 'Passion One', cursive;
    font-size: 1.7rem;
    line-height:1.05;
    letter-spacing: 0.01em;
  }
  .modal-body .field-label{
    display:block;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--mute);
    margin: 0 0 4px;
  }
  .modal-body .edit-name{
    width: 100%;
    box-sizing: border-box;
    margin: 0 0 12px;
    padding: 8px 10px;
    border: 2px solid var(--paper-deep);
    border-radius: 4px;
    font-family: 'Passion One', cursive;
    font-size: 1.35rem;
    color: var(--ink);
    background: #fff;
  }
  .modal-body .edit-desc{
    width: 100%;
    box-sizing: border-box;
    margin: 0 0 12px;
    padding: 8px 10px;
    border: 2px solid var(--paper-deep);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.9rem;
    line-height: 1.4;
    color: var(--ink);
    background: #fff;
    resize: vertical;
    min-height: 72px;
  }
  .modal-body .edit-name:focus,
  .modal-body .edit-desc:focus{
    outline: none;
    border-color: var(--sign);
  }
  .modal-body .modal-desc{
    margin: 0 0 12px;
    font-size: 0.92rem;
    line-height: 1.45;
    color: var(--mute);
    white-space: pre-wrap;
  }
  .modal-body .modal-price{
    font-family: 'Passion One', cursive;
    font-size: 2rem;
    color: var(--stamp);
    margin-bottom: 14px;
    line-height: 1;
  }
  .modal-actions{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .modal-actions button{
    flex:1;
    min-width: 140px;
    padding: 11px 12px;
    border-radius: 3px;
    font-size: 0.82rem;
    font-weight:700;
    font-family: inherit;
    cursor:pointer;
    border: 2px solid var(--sign);
    background: transparent;
    color: var(--sign);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .modal-actions .primary{
    background: var(--sign);
    color: var(--flyer);
  }
  .modal-actions .is-sold{
    background: var(--sold);
    border-color: var(--sold);
    color:white;
  }
  .modal-status{
    display:inline-block;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .modal-status.available{
    background: rgba(14,59,44,0.12);
    color: var(--sign);
  }
  .modal-status.gone{
    background: var(--sold);
    color: white;
  }
  input[type=file]{ display:none; }

  .count-pill{
    background: var(--card);
    border: 2px solid var(--sign);
    border-radius: 4px;
    padding: 8px 14px;
    font-size: 0.85rem;
    box-shadow: 3px 3px 0 rgba(14,59,44,0.1);
  }
  .count-pill b{ color: var(--sign); }

  .loading-panel{
    display:none;
    max-width: 920px;
    margin: 28px auto 8px;
    padding: 36px 20px 28px;
    text-align: center;
  }
  .loading-panel.is-on{ display:block; }
  .loading-ring{
    width: 46px;
    height: 46px;
    margin: 0 auto 16px;
    border-radius: 50%;
    border: 4px solid rgba(14,59,44,0.18);
    border-top-color: var(--sign);
    border-right-color: var(--flyer);
    animation: spinLoad 0.75s linear infinite;
  }
  @keyframes spinLoad { to { transform: rotate(360deg); } }
  .loading-title{
    margin: 0 0 4px;
    font-family: 'Passion One', cursive;
    font-size: 1.45rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--sign);
  }
  .loading-sub{
    margin: 0;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--mute);
  }
</style>
</head>
<body>

<header>
  <div class="brand-kicker">Todo se vende · precios firmes</div>
  <h1>Venta de cochera</h1>
  <div class="sub">Toca un artículo para ver fotos y detalles · <span id="liveDot" style="opacity:0.75;">se actualiza en vivo</span></div>
  <div class="tape" aria-hidden="true"></div>
</header>

<div id="configBanner" style="display:none; max-width:900px; margin:16px auto 0; padding:14px 18px; background:#fff3cd; border:1px solid #e0c56b; border-radius:10px; color:#5c4b00; font-size:0.88rem; line-height:1.5;"></div>

<div class="controls">
  <div class="search-row">
    <input type="text" id="search" placeholder="Buscar en la cochera… (cafetera, silla, basurero)">
  </div>
  <div class="filters" id="filters"></div>
  <div class="price-filter">
    <span>Ordenar por precio:</span>
    <button class="sort-btn" id="sortAsc">Menor a mayor ↑</button>
    <button class="sort-btn" id="sortDesc">Mayor a menor ↓</button>
    <button class="sort-btn" id="sortNone">Sin orden</button>
  </div>
  <div class="toolbar">
    <label><input type="checkbox" id="hideSold" checked> Ocultar vendidos</label>
    <div class="count-pill" id="countPill"></div>
  </div>
</div>


<div id="loadingPanel" class="loading-panel is-on" aria-live="polite" aria-busy="true">
  <div class="loading-ring" aria-hidden="true"></div>
  <p class="loading-title">Abriendo la cochera…</p>
  <p class="loading-sub">Acomodando precios y fotos</p>
</div>

<div class="grid" id="grid" hidden></div>
<div class="empty" id="emptyMsg" style="display:none;">Nada por aquí… prueba otro filtro o busca otra cosa.</div>

<footer>Venta de cochera · lo que ves aquí se actualiza al momento</footer>

<!-- Modal de ficha -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-main-photo" id="modalMainPhoto"></div>
    <div class="thumb-row" id="thumbRow"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   CONFIG — usa EL MISMO proyecto Supabase que el panel privado.
   El "anon key" es público y seguro de compartir (RLS protege los datos).
   ============================================================ */
const SUPABASE_URL = 'https://xnxynphtgeuhznjglcjp.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_dP0tWPmFghjaOLLeO9bXIA_HO4NzBZO';
const TABLE = 'venta_estado';

const _cfgReady = window.supabase && !SUPABASE_URL.includes('TU-PROYECTO') && !SUPABASE_ANON_KEY.includes('TU-ANON-KEY');

function configOk(){ return !!sb; }
function showConfigBanner(msg){
  const b = document.getElementById('configBanner');
  if(!b) return;
  b.innerHTML = msg || '⚠️ Esta página aún no está conectada a la base de datos.';
  b.style.display = 'block';
}

const CATS = {
  cocina: { label: 'Cocina', color: '#165A42' },
  muebles: { label: 'Muebles', color: '#8A6A12' },
  bano: { label: 'Baño', color: '#3D5A73' },
  electronica: { label: 'Electrónica', color: '#5A3D73' },
  hogar: { label: 'Hogar', color: '#B71C1C' },
};

const BASE_ITEMS = [
  {id:1, name:'Air fryer', price:2000, cat:'cocina'},
  {id:2, name:'Cafetera Nescafé Dolce Gusto', price:1200, cat:'cocina'},
  {id:3, name:'Mesita de sala', price:1500, cat:'muebles'},

  {id:23, name:'Pieza de baño para guardar cosillas', price:200, cat:'bano'},
  {id:24, name:'Deshumidificador pequeño', price:1000, cat:'hogar'},
  {id:25, name:'Deshumidificador grande', price:1500, cat:'hogar'},
  {id:26, name:'Espejo de cuerpo completo', price:200, cat:'muebles'},
  {id:27, name:'2 mesitas transparentes', price:400, cat:'muebles'},
  {id:28, name:'Nutribullet', price:800, cat:'cocina'},
  {id:29, name:'Basurero de escritorio', price:150, cat:'muebles'},
];

let items = BASE_ITEMS.map(i => ({ ...i }));

let state = {
  filter: 'all',
  search: '',
  hideSold: true,
  sortOrder: 'none',
  sold: {},
  photos: {},       // id -> array of {key,url}
  names: {},
  descriptions: {},
  activeThumb: {},  // id -> index of selected thumb in modal
  loading: true,
  _loadStarted: 0,
};
let openItemId = null;

const fmt = n => '$' + n.toLocaleString('es-MX');

function displayName(item){
  const custom = state.names[item.id];
  return (custom && String(custom).trim()) ? String(custom).trim() : item.name;
}
function displayDesc(item){
  return (state.descriptions[item.id] || '').trim();
}

// ====== Lectura desde la nube (solo lectura) ======
function photosToObjs(id, arr){
  return (Array.isArray(arr) ? arr : []).map((url, i) => ({ key: id + ':' + i, url }));
}

function applyRow(row){
  const id = row.id;
  state.sold[id] = !!row.sold;
  state.photos[id] = photosToObjs(id, row.photos);
  if(row.name != null && String(row.name).trim()) state.names[id] = String(row.name).trim();
  else delete state.names[id];
  if(row.description != null && String(row.description).trim()) state.descriptions[id] = String(row.description);
  else delete state.descriptions[id];

  const existing = items.find(i => i.id === id);
  const cat = row.cat && CATS[row.cat] ? row.cat : null;
  const price = row.price != null && row.price !== '' ? Number(row.price) : null;
  const nm = row.name != null ? String(row.name).trim() : '';
  if(existing){
    if(price != null && !Number.isNaN(price)) existing.price = price;
    if(cat) existing.cat = cat;
    if(nm) existing.name = nm;
  } else if(price != null && !Number.isNaN(price) && cat){
    items.push({ id, name: nm || ('Artículo #' + id), price, cat });
  }
}


function setLoading(on){
  state.loading = !!on;
  const panel = document.getElementById('loadingPanel');
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyMsg');
  if(panel){
    panel.classList.toggle('is-on', state.loading);
    panel.setAttribute('aria-busy', state.loading ? 'true' : 'false');
  }
  if(grid) grid.hidden = state.loading;
  if(empty && state.loading) empty.style.display = 'none';
}

async function finishLoading(){
  const minMs = 700;
  const elapsed = Date.now() - (state._loadStarted || Date.now());
  if(elapsed < minMs) await new Promise(r => setTimeout(r, minMs - elapsed));
  setLoading(false);
}

function isMissingTextCols(err){
  const code = err && err.code;
  const msg = String((err && err.message) || err || '');
  return code === 'PGRST204' || code === '42703' || /column.*(name|description).*(does not exist|schema cache)/i.test(msg);
}
function isMissingCatalogCols(err){
  const code = err && err.code;
  const msg = String((err && err.message) || err || '');
  return code === 'PGRST204' || code === '42703' || /column.*(price|cat).*(does not exist|schema cache)/i.test(msg);
}
function isMissingTable(err){
  const code = err && err.code;
  const msg = String((err && err.message) || err || '');
  if(isMissingTextCols(err) || isMissingCatalogCols(err)) return false;
  return code === 'PGRST205' || /could not find the table.*venta_estado/i.test(msg);
}
const CATALOG_SQL = 'alter table venta_estado add column if not exists price numeric; alter table venta_estado add column if not exists cat text;';

async function loadState(){
  state._loadStarted = Date.now();
  setLoading(true);
  if(!configOk()){ showConfigBanner(); await finishLoading(); render(); return; }
  try{
    let data, error;
    ({ data, error } = await sb.from(TABLE).select('id, sold, photos, name, description, price, cat'));
    if(error && isMissingCatalogCols(error)){
      ({ data, error } = await sb.from(TABLE).select('id, sold, photos, name, description'));
      if(!error && false){
        showConfigBanner('⚠️ <b>Para agregar artículos nuevos</b> corre en SQL Editor: <code>' + CATALOG_SQL + '</code> Luego recarga.');
      }
    }
    if(error && isMissingTextCols(error)){
      ({ data, error } = await sb.from(TABLE).select('id, sold, photos'));
    }
    if(error) throw error;
    items = BASE_ITEMS.map(i => ({ ...i }));
    state.sold = {};
    state.photos = {};
    state.names = {};
    state.descriptions = {};
    (data || []).forEach(applyRow);
  }catch(e){
    console.error('No se pudo cargar de Supabase:', e);
    const msg = String(e.message || e);
    showConfigBanner(isMissingTable(e)
      ? '⚠️ <b>Falta crear la tabla en Supabase.</b> El dueño debe correr el SQL del Paso 2 en <code>SETUP-supabase.md</code> (SQL Editor → Run) y recargar.'
      : isMissingTextCols(e)
      ? '⚠️ <b>Falta agregar columnas name/description.</b> En SQL Editor: <code>alter table venta_estado add column if not exists name text; alter table venta_estado add column if not exists description text;</code>'
      : '⚠️ <b>No se pudo hablar con Supabase.</b> ' + msg);
  }
  await finishLoading();
  render();
  subscribeRealtime();
}

// Actualización en vivo: cuando el dueño marca algo vendido o sube fotos
let realtimeStarted = false;
function subscribeRealtime(){
  if(!configOk() || realtimeStarted) return;
  realtimeStarted = true;
  sb.channel('venta-estado-publica')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE }, (payload) => {
      const row = (payload.new && payload.new.id !== undefined) ? payload.new : payload.old;
      if(!row || row.id === undefined) return;
      if(payload.eventType === 'DELETE'){
        delete state.sold[row.id];
        delete state.photos[row.id];
        delete state.names[row.id];
        delete state.descriptions[row.id];
        if(!BASE_ITEMS.some(b => b.id === row.id)){
          items = items.filter(i => i.id !== row.id);
        }
      } else {
        applyRow(row);
      }
      render();
    })
    .subscribe();
}

function buildFilters(){
  const el = document.getElementById('filters');
  el.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (state.filter==='all' ? ' active':'');
  all.textContent = 'Todos';
  all.onclick = () => { state.filter='all'; render(); };
  el.appendChild(all);
  Object.entries(CATS).forEach(([key, val]) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (state.filter===key ? ' active':'');
    btn.textContent = val.label;
    btn.onclick = () => { state.filter=key; render(); };
    el.appendChild(btn);
  });
}

function updateSortButtons(){
  document.getElementById('sortAsc').classList.toggle('active', state.sortOrder==='asc');
  document.getElementById('sortDesc').classList.toggle('active', state.sortOrder==='desc');
  document.getElementById('sortNone').classList.toggle('active', state.sortOrder==='none');
}

function render(){
  buildFilters();
  updateSortButtons();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  let filtered = items.filter(item => {
    if(state.filter !== 'all' && item.cat !== state.filter) return false;
    const q = state.search.toLowerCase();
    if(q){
      const hay = (displayName(item) + ' ' + displayDesc(item)).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(state.hideSold && state.sold[item.id]) return false;
    return true;
  });

  if(state.sortOrder === 'asc'){
    filtered = filtered.slice().sort((a,b) => a.price - b.price);
  } else if(state.sortOrder === 'desc'){
    filtered = filtered.slice().sort((a,b) => b.price - a.price);
  }

  document.getElementById('emptyMsg').style.display = filtered.length ? 'none' : 'block';

  filtered.forEach(item => {
    const isSold = !!state.sold[item.id];
    const cat = CATS[item.cat] || { label: 'Otro', color: '#165A42' };
    const photos = state.photos[item.id] || [];
    const card = document.createElement('div');
    card.className = 'card' + (isSold ? ' sold' : '');
    card.onclick = () => openModal(item.id);

    const photoBox = document.createElement('div');
    photoBox.className = 'photo-box';
    if(photos.length){
      const img = document.createElement('img');
      img.src = photos[0].url;
      photoBox.appendChild(img);
      if(photos.length > 1){
        const countBadge = document.createElement('div');
        countBadge.className = 'photo-count';
        countBadge.textContent = photos.length + ' fotos';
        photoBox.appendChild(countBadge);
      }
    } else {
      photoBox.innerHTML = `<div class="placeholder">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6b6455" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="10" r="2"/><path d="M21 15l-5-5-5 5-3-3-5 5"/></svg>
        Sin foto
      </div>`;
    }
    card.appendChild(photoBox);

    const body = document.createElement('div');
    body.className = 'card-body';

    const badge = document.createElement('div');
    badge.className = 'cat-badge';
    badge.style.background = cat.color;
    badge.textContent = cat.label;
    body.appendChild(badge);

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = displayName(item);
    body.appendChild(name);

    const priceRow = document.createElement('div');
    priceRow.className = 'price-row';
    const price = document.createElement('div');
    price.className = 'price';
    price.textContent = fmt(item.price);
    priceRow.appendChild(price);

    const tag = document.createElement('div');
    tag.className = 'status-tag ' + (isSold ? 'gone' : 'available');
    tag.textContent = isSold ? 'Vendido' : 'Disponible';
    priceRow.appendChild(tag);

    body.appendChild(priceRow);
    card.appendChild(body);
    grid.appendChild(card);
  });

  const available = items.filter(i => !state.sold[i.id]).length;
  document.getElementById('countPill').innerHTML =
    `<b>${available}</b> disponibles de ${items.length}`;

  if(openItemId !== null){
    renderModal(openItemId);
  }
}

function openModal(id){
  openItemId = id;
  if(state.activeThumb[id] === undefined) state.activeThumb[id] = 0;
  document.getElementById('modalOverlay').classList.add('open');
  renderModal(id);
}

function closeModal(){
  openItemId = null;
  document.getElementById('modalOverlay').classList.remove('open');
}

function renderModal(id){
  const item = items.find(i => i.id === id);
  if(!item) return;
  const cat = CATS[item.cat];
  const photos = state.photos[id] || [];
  const isSold = !!state.sold[id];
  let activeIdx = state.activeThumb[id] || 0;
  if(activeIdx >= photos.length) activeIdx = Math.max(0, photos.length - 1);
  state.activeThumb[id] = activeIdx;

  const mainPhoto = document.getElementById('modalMainPhoto');
  mainPhoto.innerHTML = '';
  if(photos.length){
    const img = document.createElement('img');
    img.src = photos[activeIdx].url;
    mainPhoto.appendChild(img);
  } else {
    mainPhoto.innerHTML = `<div class="placeholder">Sin fotos todavía</div>`;
  }

  const thumbRow = document.getElementById('thumbRow');
  thumbRow.innerHTML = '';
  photos.forEach((p, idx) => {
    const t = document.createElement('img');
    t.className = 'thumb' + (idx === activeIdx ? ' active' : '');
    t.src = p.url;
    t.onclick = () => { state.activeThumb[id] = idx; renderModal(id); };
    thumbRow.appendChild(t);
  });
  thumbRow.style.display = photos.length > 1 ? 'flex' : 'none';

  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  const badge = document.createElement('div');
  badge.className = 'cat-badge';
  badge.style.background = cat.color;
  badge.textContent = cat.label;
  body.appendChild(badge);

  const h2 = document.createElement('h2');
  h2.textContent = displayName(item);
  body.appendChild(h2);

  const desc = displayDesc(item);
  if(desc){
    const descEl = document.createElement('p');
    descEl.className = 'modal-desc';
    descEl.textContent = desc;
    body.appendChild(descEl);
  }

  const priceEl = document.createElement('div');
  priceEl.className = 'modal-price';
  priceEl.textContent = fmt(item.price);
  body.appendChild(priceEl);

  const status = document.createElement('div');
  status.className = 'modal-status ' + (isSold ? 'gone' : 'available');
  status.textContent = isSold ? '● Vendido' : '● Disponible';
  body.appendChild(status);
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if(e.target.id === 'modalOverlay') closeModal();
});

document.getElementById('search').addEventListener('input', (e) => {
  state.search = e.target.value;
  render();
});
document.getElementById('hideSold').addEventListener('change', (e) => {
  state.hideSold = e.target.checked;
  render();
});
document.getElementById('sortAsc').addEventListener('click', () => {
  state.sortOrder = 'asc';
  render();
});
document.getElementById('sortDesc').addEventListener('click', () => {
  state.sortOrder = 'desc';
  render();
});
document.getElementById('sortNone').addEventListener('click', () => {
  state.sortOrder = 'none';
  render();
});

loadState();
</script>
